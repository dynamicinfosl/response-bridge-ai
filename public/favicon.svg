<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Corpo principal do foguete (diagonal, maior) -->
  <path d="M6 26 L26 6 L28 8 L24 12 L24 20 L20 24 L12 24 L8 28 Z" 
        fill="url(#blueGradient)" 
        stroke="#1e40af" 
        stroke-width="0.8"/>
  
  <!-- Ponta do foguete -->
  <path d="M24 12 L26 6 L28 8 L24 12" 
        fill="url(#darkBlue)" 
        stroke="#1e3a8a" 
        stroke-width="0.5"/>
  
  <!-- Janela do foguete -->
  <circle cx="18" cy="14" r="2.5" fill="#1e40af" stroke="#1e3a8a" stroke-width="0.5"/>
  <circle cx="18" cy="14" r="1.8" fill="#3b82f6"/>
  <circle cx="18" cy="14" r="1.2" fill="#60a5fa"/>
  
  <!-- Aletas do foguete -->
  <path d="M12 24 L8 28 L6 26 L10 22" fill="url(#blueGradient)" stroke="#1e40af" stroke-width="0.5"/>
  <path d="M20 24 L24 20 L26 22 L22 26" fill="url(#blueGradient)" stroke="#1e40af" stroke-width="0.5"/>
  
  <!-- Detalhes do corpo -->
  <rect x="14" y="16" width="6" height="1.5" fill="#1e40af" opacity="0.7" transform="rotate(45 17 16.75)"/>
  <rect x="16" y="18" width="6" height="1.5" fill="#1e40af" opacity="0.7" transform="rotate(45 19 18.75)"/>
  
  <!-- Brilho na janela -->
  <ellipse cx="17.2" cy="13.2" rx="0.8" ry="1" fill="#ffffff" opacity="0.8"/>
  
  <!-- Propulsão (chamas azuis) -->
  <path d="M6 26 L2 30 L4 28 L6 26" fill="#3b82f6" opacity="0.8"/>
  <path d="M8 28 L4 32 L6 30 L8 28" fill="#60a5fa" opacity="0.6"/>
</svg>
